<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 1 - Submit com Arrow Function</title>
    <link rel="stylesheet" href="style.css">
    <script src="script1.js" defer></script>
</head>
<body>
    <main class="container">
        <h1>Calculadora de Quadrado</h1>

        <p class="descricao">
            Nesta atividade, o evento <strong>submit</strong> do formulário foi tratado com uma
            <strong>arrow function</strong>.
        </p>

        <form id="numeroForm">
            <label for="numero">Digite um número:</label>
            <input type="number" id="numero" name="numero" step="any" required>

            <button type="submit">Calcular Quadrado</button>
        </form>

        <section class="resultado">
            <p id="resultado">O resultado aparecerá aqui.</p>
        </section>
    </main>
</body>
</html>
